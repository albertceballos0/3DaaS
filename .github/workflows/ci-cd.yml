name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PROJECT_ID: skillful-air-480018-f2
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/skillful-air-480018-f2/nerfstudio-repo
  IMAGE: image-api
  SERVICE: api-3daas
  SA_EMAIL: custom-models@skillful-air-480018-f2.iam.gserviceaccount.com

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: pytest
        run: pytest tests/ -v --tb=short

  # ── 2. Build & Deploy (master branch only) ────────────────────────────────────
  deploy:
    name: Build and deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Auth via service account key stored as GitHub secret GCP_SA_KEY
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          docker build \
            -f docker-images/Dockerfile.api \
            -t "$IMAGE_TAG" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE }}:latest" \
            .
          docker push "$IMAGE_TAG"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE_TAG" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account ${{ env.SA_EMAIL }} \
            --port 8080 \
            --set-env-vars "\
          GCP_PROJECT_ID=${{ env.PROJECT_ID }},\
          GCP_REGION=${{ env.REGION }},\
          GCS_BUCKET=bucket-saas-project,\
          GCP_SERVICE_ACCOUNT=${{ env.SA_EMAIL }},\
          IMAGE_PREPROCESS=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/nerfstudio-repo/image-preprocess:v2,\
          IMAGE_TRAIN=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/nerfstudio-repo/image-train-l4:v1,\
          WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}"

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
