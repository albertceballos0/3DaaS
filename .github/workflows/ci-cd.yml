name: CI / CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  PROJECT_ID: skillful-air-480018-f2
  REGION:     us-central1
  VM_NAME:    ${{ vars.GCE_VM_NAME }}
  VM_ZONE:    ${{ vars.GCE_VM_ZONE }}

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: pytest
        run: pytest tests/ -v --tb=short

  # ── 2. Deploy a GCE VM (solo en push a master) ───────────────────────────────
  deploy:
    name: Deploy to GCE VM
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Asegura que la VM está corriendo
      - name: Start VM if stopped
        run: |
          STATUS=$(gcloud compute instances describe "$VM_NAME" \
            --zone="$VM_ZONE" --project="$PROJECT_ID" \
            --format="value(status)")
          if [ "$STATUS" != "RUNNING" ]; then
            echo "VM está $STATUS — iniciando..."
            gcloud compute instances start "$VM_NAME" --zone="$VM_ZONE" --project="$PROJECT_ID"
            sleep 20
          fi

      # Copia el código fuente a la VM
      - name: Sync code to VM
        run: |
          REMOTE_DIR=$(gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$PROJECT_ID" \
            --command="echo \$HOME/3daas" | tail -1)
          echo "REMOTE_DIR=$REMOTE_DIR" >> "$GITHUB_ENV"

          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$PROJECT_ID" \
            --command="mkdir -p $REMOTE_DIR"

          gcloud compute scp --recurse --compress \
            --zone="$VM_ZONE" --project="$PROJECT_ID" \
            api flows scripts docker-images \
            docker-compose.yml prefect.yaml requirements.txt \
            "$VM_NAME:$REMOTE_DIR/"

      # Escribe el .env en la VM desde los secrets de GitHub
      - name: Write .env on VM
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$PROJECT_ID" \
            --command="cat > $REMOTE_DIR/.env << 'ENVEOF'
          GCP_PROJECT_ID=${{ env.PROJECT_ID }}
          GCP_REGION=${{ env.REGION }}
          GCS_BUCKET=${{ secrets.GCS_BUCKET }}
          GCP_SERVICE_ACCOUNT=${{ secrets.GCP_SERVICE_ACCOUNT }}
          IMAGE_PREPROCESS=${{ secrets.IMAGE_PREPROCESS }}
          IMAGE_TRAIN=${{ secrets.IMAGE_TRAIN }}
          GCP_SA_KEY_PATH=
          PREFECT_API_URL=http://localhost:4200/api
          PREFECT_API_KEY=
          PREFECT_DEPLOYMENT=gaussian-pipeline/prod
          WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
          ENVEOF"

      # Instala Docker si no está (idempotente)
      - name: Ensure Docker is installed
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$PROJECT_ID" \
            --command="
              if ! docker --version > /dev/null 2>&1; then
                curl -fsSL https://get.docker.com | sudo sh
                sudo usermod -aG docker \$USER
                sudo systemctl enable --now docker
              fi
              if ! docker compose version > /dev/null 2>&1; then
                sudo apt-get install -y --no-install-recommends docker-compose-plugin
              fi
            "

      # Reconstruye y reinicia el stack
      - name: docker compose up --build -d
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$VM_ZONE" --project="$PROJECT_ID" \
            --command="
              cd $REMOTE_DIR
              docker compose pull prefect-server 2>/dev/null || true
              docker compose up --build -d
              docker compose ps
            "

      # Health check
      - name: Health check
        run: |
          sleep 10
          EXTERNAL_IP=$(gcloud compute instances describe "$VM_NAME" \
            --zone="$VM_ZONE" --project="$PROJECT_ID" \
            --format="value(networkInterfaces[0].accessConfigs[0].natIP)")
          echo "VM IP: $EXTERNAL_IP"
          curl -sf "http://${EXTERNAL_IP}:8080/health" && echo "API OK" || echo "API aún arrancando (normal en primer deploy)"
          echo ""
          echo "Prefect UI: http://${EXTERNAL_IP}:4200"
          echo "API:        http://${EXTERNAL_IP}:8080"
